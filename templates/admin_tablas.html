<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Tablas - Aguascalientes</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { margin:0; padding:0; font-family: Arial, sans-serif; background:#fff; }
        .container { width:100%; max-width:700px; margin:0 auto; background:#fff; }
        .header, .footer { width:100%; text-align:center; }
        .header img, .footer img { width:100%; height:auto; display:block; }
        
        .validacion-titulo {
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            color: #3B5998;
            letter-spacing: 2px;
            margin: 20px 0;
            padding: 15px;
            text-transform: uppercase;
            font-family: 'Arial', sans-serif;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }
        
        .resultado-titulo {
            text-align: center;
            font-size: 26px;
            font-weight: bold;
            color: #3B5998;
            letter-spacing: 1px;
            margin: 25px 0 20px 0;
            padding: 10px;
            text-transform: uppercase;
            font-family: 'Arial', sans-serif;
        }
        
        .content { padding:20px; }
        
        .btn-back {
            background:#666; 
            color:#fff; 
            padding:12px 24px; 
            text-decoration:none;
            border-radius:8px; 
            font-size:14px; 
            font-weight:bold; 
            display:inline-block; 
            margin-bottom:20px;
        }
        
        .btn-back:hover { background:#444; }
        
        .table-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin: 20px 0;
        }
        
        .table-item {
            background:#e8f5e8; 
            border:3px solid #3B5998; 
            padding:25px; 
            border-radius:15px;
            text-decoration: none;
            color: #2d5730;
            display: block;
            transition: all 0.3s;
        }
        
        .table-item:hover {
            background:#d4edd4;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(59, 89, 152, 0.2);
        }
        
        .table-icon {
            font-size: 40px;
            text-align: center;
            margin-bottom: 10px;
        }
        
        .table-name {
            font-size: 20px;
            font-weight: bold;
            text-align: center;
            color: #3B5998;
            margin-bottom: 5px;
        }
        
        .table-desc {
            font-size: 14px;
            text-align: center;
            color: #2d5730;
        }
        
        @media (max-width:600px){
            .content{ padding:15px; }
            .validacion-titulo { font-size: 20px; letter-spacing: 1px; margin: 15px 0; padding: 10px; }
            .resultado-titulo { font-size: 22px; margin: 20px 0 15px 0; }
            .table-item { padding: 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="/static/encabezado.jpg" alt="Encabezado Aguascalientes" loading="lazy">
        </div>

        <div class="validacion-titulo">
            SISTEMA DE PERMISOS DIGITALES
        </div>
        
        <div class="resultado-titulo">
            GESTIÓN DE TABLAS
        </div>

        <div class="content">
            <a href="/panel/admin" class="btn-back">← Volver al Panel</a>
            
            <div class="table-grid">
                {% for tabla_key, tabla_nombre in tablas.items() %}
                <a href="/panel/admin_tabla/{{ tabla_key }}" class="table-item">
                    <div class="table-icon">🗂️</div>
                    <div class="table-name">{{ tabla_nombre }}</div>
                    <div class="table-desc">Ver todos los registros</div>
                </a>
                {% endfor %}
            </div>
        </div>

        <div class="footer">
            <img src="/static/pie.jpg" alt="Pie Aguascalientes" loading="lazy">
        </div>
    </div>
</body>
</html>
