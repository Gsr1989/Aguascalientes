<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel Administrativo - Aguascalientes</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }
        
        body { 
            font-family: Arial, sans-serif; 
            background: #6B73C1;
            min-height: 100vh;
        }
        
        .main-container {
            width: 100%;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .login-card {
            width: 100%;
            max-width: 450px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        
        .header-logo {
            width: 100%;
            padding: 20px;
            background: white;
            text-align: center;
        }
        
        .header-logo img {
            max-width: 200px;
            height: auto;
        }
        
        .citas-section {
            background: #f8f9fa;
            padding: 12px 20px;
            border-bottom: 2px solid #e0e0e0;
            font-size: 16px;
            color: #5a6c7d;
            font-weight: 600;
        }
        
        .login-content {
            padding: 40px 30px;
        }
        
        .welcome-title {
            font-size: 32px;
            font-weight: bold;
            color: #1e3a8a;
            margin-bottom: 30px;
            text-align: left;
        }
        
        .system-info {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 3px solid #6B73C1;
        }
        
        .system-info .icon {
            font-size: 48px;
            margin-bottom: 10px;
        }
        
        .system-info h2 {
            color: #5a6c7d;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 5px;
        }
        
        .system-info p {
            color: #9ca3af;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #374151;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        .label-icon {
            font-size: 16px;
        }
        
        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #d1d5db;
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.3s ease;
            background: white;
        }
        
        input::placeholder {
            color: #9ca3af;
        }
        
        input:focus {
            outline: none;
            border-color: #6B73C1;
            box-shadow: 0 0 0 3px rgba(107, 115, 193, 0.1);
        }
        
        .btn-login {
            width: 100%;
            padding: 16px;
            background: #6B73C1;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .btn-login:hover {
            background: #5a5fa8;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(107, 115, 193, 0.3);
        }
        
        .btn-login:active {
            transform: translateY(0);
        }
        
        .error-message {
            background: #fee2e2;
            border-left: 4px solid #ef4444;
            color: #991b1b;
            padding: 14px 16px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .footer-text {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #e5e7eb;
        }
        
        .footer-text p {
            color: #6b7280;
            font-size: 13px;
            line-height: 1.6;
        }
        
        .footer-text strong {
            color: #374151;
            display: block;
            margin-bottom: 4px;
        }
        
        @media (max-width: 600px) {
            .main-container {
                padding: 10px;
            }
            
            .login-card {
                max-width: 100%;
            }
            
            .login-content {
                padding: 30px 20px;
            }
            
            .welcome-title {
                font-size: 26px;
            }
            
            .system-info .icon {
                font-size: 40px;
            }
            
            input[type="text"],
            input[type="password"] {
                padding: 12px 14px;
            }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="login-card">
            <!-- Header con logo de Aguascalientes -->
            <div class="header-logo">
                <img src="/static/encabezado.jpg" alt="Gobierno de Aguascalientes" style="width: 100%; max-width: 100%;">
            </div>
            
            <!-- Sección "Citas Web" -->
            <div class="citas-section">
                Citas Web
            </div>
            
            <!-- Contenido del login -->
            <div class="login-content">
                <h1 class="welcome-title">BIENVENIDO</h1>
                
                <!-- Info del sistema -->
                <div class="system-info">
                    <div class="icon">🏛️</div>
                    <h2>CMOV</h2>
                    <p>Panel de Administración</p>
                </div>
                
                <!-- Mensaje de error -->
                {% if request.query_params.get('error') %}
                <div class="error-message">
                    <span>❌</span>
                    <span>Usuario o contraseña incorrectos</span>
                </div>
                {% endif %}
                
                <!-- Formulario -->
                <form method="POST" action="/panel/login">
                    <div class="form-group">
                        <label for="username">
                            <span class="label-icon">👤</span>
                            <span>Usuario</span>
                        </label>
                        <input 
                            type="text" 
                            id="username" 
                            name="username" 
                            placeholder="Ingrese su usuario"
                            required 
                            autofocus
                        >
                    </div>
                    
                    <div class="form-group">
                        <label for="password">
                            <span class="label-icon">🔒</span>
                            <span>Contraseña</span>
                        </label>
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            placeholder="Ingrese su contraseña"
                            required
                        >
                    </div>
                    
                    <button type="submit" class="btn-login">
                        <span>🚀</span>
                        <span>INICIAR SESIÓN</span>
                    </button>
                </form>
                
                <!-- Footer -->
                <div class="footer-text">
                    <p>
                        <strong>Sistema de Permisos Digitales</strong>
                        Coordinación General de Movilidad<br>
                        Gobierno del Estado de Aguascalientes
                    </p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
