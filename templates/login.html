<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - Panel Administrativo Aguascalientes</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }
        
        body { 
            font-family: Arial, sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            width: 100%;
            max-width: 500px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.3);
            overflow: hidden;
            animation: slideIn 0.5s ease-out;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .header {
            width: 100%;
            text-align: center;
        }
        
        .header img {
            width: 100%;
            height: auto;
            display: block;
        }
        
        .login-box {
            padding: 50px 40px;
        }
        
        .logo-title {
            text-align: center;
            margin-bottom: 15px;
        }
        
        .logo-title h1 {
            color: #3B5998;
            font-size: 32px;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: bold;
        }
        
        .logo-title p {
            color: #666;
            font-size: 16px;
            font-weight: 500;
        }
        
        .divider {
            height: 3px;
            background: linear-gradient(90deg, #3B5998, #667eea);
            margin: 25px 0 35px 0;
            border-radius: 10px;
        }
        
        .error {
            background: linear-gradient(135deg, #ff5252, #f44336);
            color: white;
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 25px;
            text-align: center;
            font-weight: bold;
            font-size: 15px;
            box-shadow: 0 4px 15px rgba(244, 67, 54, 0.3);
            animation: shake 0.5s;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        
        .form-group {
            margin-bottom: 25px;
            position: relative;
        }
        
        label {
            display: block;
            color: #333;
            font-weight: bold;
            margin-bottom: 10px;
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .icon {
            font-size: 18px;
        }
        
        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s ease;
            background: #f9f9f9;
        }
        
        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #3B5998;
            background: white;
            box-shadow: 0 0 0 4px rgba(59, 89, 152, 0.1);
        }
        
        .btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #3B5998, #667eea);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            box-shadow: 0 6px 20px rgba(59, 89, 152, 0.3);
            margin-top: 10px;
        }
        
        .btn:hover {
            background: linear-gradient(135deg, #2d4373, #5568d3);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(59, 89, 152, 0.4);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .footer-info {
            text-align: center;
            margin-top: 30px;
            padding-top: 25px;
            border-top: 2px solid #f0f0f0;
        }
        
        .footer-info p {
            color: #999;
            font-size: 13px;
            line-height: 1.6;
        }
        
        .footer-info strong {
            color: #3B5998;
        }
        
        @media (max-width: 600px) {
            .login-box { 
                padding: 40px 25px; 
            }
            
            .logo-title h1 { 
                font-size: 26px; 
            }
            
            .logo-title p {
                font-size: 14px;
            }
            
            input[type="text"],
            input[type="password"] {
                padding: 13px 16px;
                font-size: 15px;
            }
            
            .btn {
                padding: 14px;
                font-size: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="/static/encabezado.jpg" alt="Gobierno de Aguascalientes">
        </div>
        
        <div class="login-box">
            <div class="logo-title">
                <h1>🏛️ CMOV</h1>
                <p>Panel de Administración</p>
            </div>
            
            <div class="divider"></div>
            
            {% if request.query_params.get('error') %}
            <div class="error">
                ❌ Usuario o contraseña incorrectos
            </div>
            {% endif %}
            
            <form method="POST" action="/panel/login">
                <div class="form-group">
                    <label for="username">
                        <span class="icon">👤</span> Usuario
                    </label>
                    <input 
                        type="text" 
                        id="username" 
                        name="username" 
                        placeholder="Ingrese su usuario"
                        required 
                        autofocus
                    >
                </div>
                
                <div class="form-group">
                    <label for="password">
                        <span class="icon">🔒</span> Contraseña
                    </label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="Ingrese su contraseña"
                        required
                    >
                </div>
                
                <button type="submit" class="btn">
                    🚀 Iniciar Sesión
                </button>
            </form>
            
            <div class="footer-info">
                <p>
                    <strong>Sistema de Permisos Digitales</strong><br>
                    Coordinación General de Movilidad<br>
                    Gobierno del Estado de Aguascalientes
                </p>
            </div>
        </div>
    </div>
</body>
</html>
