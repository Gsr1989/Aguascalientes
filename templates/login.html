<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel Administrativo - Aguascalientes</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { margin:0; padding:0; font-family: Arial, sans-serif; background:#fff; }
        .container { width:100%; max-width:600px; margin:0 auto; background:#fff; }
        .header, .footer { width:100%; text-align:center; }
        .header img, .footer img { width:100%; height:auto; display:block; }
        
        .validacion-titulo {
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            color: #3B5998;
            letter-spacing: 2px;
            margin: 20px 0;
            padding: 15px;
            text-transform: uppercase;
            font-family: 'Arial', sans-serif;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }
        
        .resultado-titulo {
            text-align: center;
            font-size: 26px;
            font-weight: bold;
            color: #3B5998;
            letter-spacing: 1px;
            margin: 25px 0 20px 0;
            padding: 10px;
            text-transform: uppercase;
            font-family: 'Arial', sans-serif;
        }
        
        .content { padding:20px; text-align:center; }
        
        .login-box {
            background:#e8f5e8; 
            border:3px solid #3B5998; 
            color:#2d5730;
            padding:30px; 
            border-radius:15px; 
            margin:20px 0; 
            font-size:16px; 
            line-height:1.8;
        }
        
        .error-msg {
            background:#ffeaea; 
            border:3px solid #f44336; 
            color:#8b2635;
            padding:15px; 
            border-radius:10px; 
            margin:20px 0; 
            font-size:16px; 
            font-weight:bold;
            text-align:center;
        }
        
        .form-group { 
            margin:20px 0; 
            text-align:left; 
        }
        
        label {
            display:block;
            font-weight:bold;
            margin-bottom:8px;
            color:#2d5730;
            font-size:16px;
        }
        
        input[type="text"],
        input[type="password"] {
            width:100%;
            padding:12px;
            border:2px solid #4caf50;
            border-radius:8px;
            font-size:16px;
            box-sizing:border-box;
        }
        
        input:focus {
            outline:none;
            border-color:#3B5998;
        }
        
        .btn-login {
            background:#3B5998; 
            color:#fff; 
            padding:15px 30px; 
            text-decoration:none;
            border:none;
            border-radius:8px; 
            font-size:16px; 
            font-weight:bold; 
            display:inline-block; 
            transition:background .3s;
            cursor:pointer;
            width:100%;
            margin-top:20px;
        }
        
        .btn-login:hover { 
            background:#2d4373; 
        }
        
        @media (max-width:600px){
            .content{ padding:15px; }
            .login-box{ padding:20px; font-size:14px; }
            .validacion-titulo { font-size: 20px; letter-spacing: 1px; margin: 15px 0; padding: 10px; }
            .resultado-titulo { font-size: 22px; margin: 20px 0 15px 0; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Encabezado -->
        <div class="header">
            <img src="/static/encabezado.jpg" alt="Encabezado Aguascalientes" loading="lazy">
        </div>

        <!-- Leyenda -->
        <div class="validacion-titulo">
            SISTEMA DE PERMISOS DIGITALES
        </div>
        
        <!-- Título -->
        <div class="resultado-titulo">
            PANEL DE ADMINISTRACIÓN
        </div>

        <!-- Contenido -->
        <div class="content">
            {% if request.query_params.get('error') %}
            <div class="error-msg">
                ❌ Usuario o contraseña incorrectos
            </div>
            {% endif %}
            
            <div class="login-box">
                <form method="POST" action="/panel/login">
                    <div class="form-group">
                        <label>👤 Usuario</label>
                        <input type="text" name="username" required autofocus placeholder="Ingrese su usuario">
                    </div>
                    
                    <div class="form-group">
                        <label>🔒 Contraseña</label>
                        <input type="password" name="password" required placeholder="Ingrese su contraseña">
                    </div>
                    
                    <button type="submit" class="btn-login">INICIAR SESIÓN</button>
                </form>
            </div>
        </div>

        <!-- Pie de página -->
        <div class="footer">
            <img src="/static/pie.jpg" alt="Pie Aguascalientes" loading="lazy">
        </div>
    </div>
</body>
</html>
