<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel Administrativo - Aguascalientes</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { margin:0; padding:0; font-family: Arial, sans-serif; background:#fff; }
        .container { width:100%; max-width:600px; margin:0 auto; background:#fff; }
        .header, .footer { width:100%; text-align:center; }
        .header img, .footer img { width:100%; height:auto; display:block; }
        
        .validacion-titulo {
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            color: #3B5998;
            letter-spacing: 2px;
            margin: 20px 0;
            padding: 15px;
            text-transform: uppercase;
        }
        
        .resultado-titulo {
            text-align: center;
            font-size: 26px;
            font-weight: bold;
            color: #3B5998;
            margin: 25px 0 20px 0;
        }
        
        .content { padding:20px; text-align:center; }
        
        .login-box {
            background:#e8f5e8; 
            border:3px solid #3B5998; 
            color:#2d5730;
            padding:30px; 
            border-radius:15px; 
            margin:20px 0;
        }
        
        .error-msg {
            background:#ffeaea; 
            border:3px solid #f44336; 
            color:#8b2635;
            padding:15px; 
            border-radius:10px; 
            margin:20px 0; 
            font-weight:bold;
        }
        
        .form-group { margin:20px 0; text-align:left; }
        
        label {
            display:block;
            font-weight:bold;
            margin-bottom:8px;
        }
        
        input {
            width:100%;
            padding:12px;
            border:2px solid #4caf50;
            border-radius:8px;
            font-size:16px;
        }
        
        input:focus {
            outline:none;
            border-color:#3B5998;
        }
        
        .btn-login {
            background:#3B5998; 
            color:#fff; 
            padding:15px; 
            border:none;
            border-radius:8px; 
            font-size:16px; 
            font-weight:bold; 
            width:100%;
            margin-top:20px;
            cursor:pointer;
        }
        
        .btn-login:hover { background:#2d4373; }
    </style>
</head>
<body>
    <div class="container">
        
        <div class="header">
            <img src="/static/encabezado.jpg" alt="Encabezado">
        </div>

        <div class="validacion-titulo">
            SISTEMA DE PERMISOS DIGITALES
        </div>
        
        <div class="resultado-titulo">
            PANEL DE ADMINISTRACIÓN
        </div>

        <div class="content">

            <!-- 🔴 ERROR CONTROLADO -->
            {% if error %}
            <div class="error-msg">
                ❌ Usuario o contraseña incorrectos
            </div>
            {% endif %}
            
            <div class="login-box">
                <form method="POST" action="/panel/login">
                    
                    <div class="form-group">
                        <label>👤 Usuario</label>
                        <input type="text" name="username" required>
                    </div>
                    
                    <div class="form-group">
                        <label>🔒 Contraseña</label>
                        <input type="password" name="password" required>
                    </div>
                    
                    <button type="submit" class="btn-login">
                        INICIAR SESIÓN
                    </button>
                    
                </form>
            </div>
        </div>

        <div class="footer">
            <img src="/static/pie.jpg" alt="Pie">
        </div>
    </div>
</body>
</html>
